name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: install tools
        run: cargo install cargo-audit cargo-deny cargo-nextest --locked

      # rustfmt resolves mod declarations even behind #[cfg(feature = "private")],
      # so it fails if the private symlinks (from hub-private) aren't present.
      # Empty stubs satisfy the resolver; the feature gate keeps them out of compilation.
      - name: create private module stubs
        run: |
          mkdir -p clients/src/private workflows/src/private
          touch clients/src/private/mod.rs workflows/src/private/mod.rs

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy -- -D warnings

      - name: test
        run: cargo nextest run

      - name: audit
        run: cargo audit

      - name: deny
        run: cargo deny check bans advisories sources
